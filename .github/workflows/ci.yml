name: CloudTask CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, task-service, team-service, notification-service]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Verify dependencies
      if: hashFiles(format('services/{0}/go.mod', matrix.service)) != ''
      run: |
        cd services/${{ matrix.service }}
        go mod tidy

    - name: Build
      if: hashFiles(format('services/{0}/go.mod', matrix.service)) != ''
      run: |
        cd services/${{ matrix.service }}
        go build -v ./...

    - name: Test
      if: hashFiles(format('services/{0}/go.mod', matrix.service)) != ''
      run: |
        cd services/${{ matrix.service }}
        go test -v ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      if: hashFiles('frontend/package.json') != ''
      run: |
        cd frontend
        npm ci || npm install

    - name: Build
      if: hashFiles('frontend/package.json') != ''
      run: |
        cd frontend
        npm run build

  release:
    needs: [build-and-test-go, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
          - service: task-service
            context: services/task-service
          - service: team-service
            context: services/team-service
          - service: notification-service
            context: services/notification-service
          - service: api-gateway
            context: api-gateway
          - service: frontend
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
